<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 实时工资计算器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
  }

  /* 背景粒子 */
  #particles {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .particle {
    position: absolute;
    background: radial-gradient(circle, #ffd700 0%, transparent 70%);
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* 主容器 */
  .main-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* 设置面板 */
  .settings-panel {
    background: linear-gradient(135deg, rgba(30,25,15,0.95), rgba(20,15,5,0.95));
    border: 2px solid #b8860b;
    border-radius: 24px;
    padding: 30px 40px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 0 40px rgba(255,215,0,0.15), inset 0 0 40px rgba(255,215,0,0.03);
    margin-bottom: 30px;
    backdrop-filter: blur(20px);
  }
  .settings-panel.hidden { display: none; }

  .settings-title {
    font-size: 1.4em;
    font-weight: 700;
    text-align: center;
    margin-bottom: 24px;
    background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .input-group {
    margin-bottom: 16px;
  }
  .input-group label {
    display: block;
    font-size: 0.85em;
    color: #c9a84c;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .input-row {
    display: flex;
    gap: 16px;
  }
  .input-row .input-group { flex: 1; }

  .input-group input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(0,0,0,0.4);
    border: 1px solid #b8860b;
    border-radius: 12px;
    color: #ffd700;
    font-size: 1.1em;
    font-family: inherit;
    outline: none;
    transition: all 0.3s;
  }
  .input-group input:focus {
    border-color: #ffd700;
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
  }
  .input-group input::placeholder { color: #665500; }

  .btn {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border: none;
    border-radius: 14px;
    font-size: 1.15em;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 2px;
  }
  .btn-start {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    color: #1a1a00;
    box-shadow: 0 4px 24px rgba(255,215,0,0.3);
  }
  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(255,215,0,0.5);
  }
  .btn-start:active { transform: scale(0.97); }

  .btn-reset {
    background: transparent;
    border: 1px solid #b8860b;
    color: #c9a84c;
    margin-top: 10px;
  }
  .btn-reset:hover { border-color: #ffd700; color: #ffd700; }

  /* 显示区 */
  .display-area {
    text-align: center;
    position: relative;
  }

  .info-bar {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .info-item {
    background: rgba(20,15,5,0.8);
    border: 1px solid rgba(184,134,11,0.5);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.85em;
    color: #c9a84c;
    backdrop-filter: blur(10px);
  }
  .info-item span {
    display: block;
    font-size: 1.3em;
    font-weight: 700;
    color: #ffd700;
    margin-top: 2px;
  }

  .money-label {
    font-size: 1em;
    color: #c9a84c;
    letter-spacing: 4px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .money-display {
    position: relative;
    display: inline-block;
  }

  .money-symbol {
    font-size: 1.5em;
    color: #ffd700;
    vertical-align: top;
    margin-right: 4px;
  }

  .money-amount {
    font-size: clamp(2.5em, 8vw, 6em);
    font-weight: 900;
    background: linear-gradient(180deg,
      #fff8dc 0%, #ffd700 20%, #ffaa00 50%, #ffd700 80%, #ff8c00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
    transition: transform 0.1s;
  }

  .money-per-second {
    color: #b8860b;
    font-size: 0.9em;
    margin-top: 8px;
    letter-spacing: 2px;
  }
  .money-per-second span {
    color: #ffd700;
    font-weight: 700;
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 400px;
    height: 3px;
    background: rgba(184,134,11,0.2);
    border-radius: 2px;
    margin: 20px auto;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #b8860b, #ffd700, #ffaa00);
    border-radius: 2px;
    transition: width 1s linear;
    box-shadow: 0 0 10px rgba(255,215,0,0.5);
  }

  /* 金币掉落画布 */
  #coinCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* 脉冲效果 */
  .pulse {
    animation: moneyPulse 0.3s ease-out;
  }
  @keyframes moneyPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  /* 闪金光 */
  .flash-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 5;
    animation: flashIn 0.6s ease-out forwards;
  }
  @keyframes flashIn {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* 响应式 */
  @media (max-width: 600px) {
    .settings-panel { padding: 20px 24px; }
    .input-row { flex-direction: column; gap: 0; }
    .info-bar { gap: 10px; }
    .info-item { padding: 8px 14px; font-size: 0.75em; }
  }
</style>
</head>
<body>

<div id="particles"></div>
<canvas id="coinCanvas"></canvas>

<div class="main-container">

  <!-- 设置面板 -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">⚜️ 设置你的财富参数 ⚜️</div>
    <div class="input-group">
      <label>💰 月薪 (税前)</label>
      <input type="number" id="salary" placeholder="例如: 25000" value="25000" step="100">
    </div>
    <div class="input-row">
      <div class="input-group">
        <label>⏰ 上班时间</label>
        <input type="time" id="startTime" value="09:00">
      </div>
      <div class="input-group">
        <label>🏠 下班时间</label>
        <input type="time" id="endTime" value="18:00">
      </div>
    </div>
    <div class="input-group">
      <label>📅 每月工作天数</label>
      <input type="number" id="workDays" placeholder="例如: 22" value="22" min="1" max="31">
    </div>
    <button class="btn btn-start" id="btnStart" onclick="startEarning()">
      ⚡ 开始赚钱 ⚡
    </button>
    <button class="btn btn-reset" id="btnReset" onclick="resetAll()">
      🔄 重新设置
    </button>
  </div>

  <!-- 显示区 -->
  <div class="display-area" id="displayArea" style="display:none;">
    <div class="info-bar">
      <div class="info-item">
        秒薪
        <span id="infoPerSec">--</span>
      </div>
      <div class="info-item">
        时薪
        <span id="infoPerHour">--</span>
      </div>
      <div class="info-item">
        今日已赚
        <span id="infoToday">--</span>
      </div>
    </div>

    <div class="money-label">✦ 实时累计收入 ✦</div>
    <div class="money-display">
      <span class="money-symbol">¥</span>
      <span class="money-amount" id="moneyAmount">0.00</span>
    </div>
    <div class="money-per-second">
      每秒进账 <span id="moneyPerSec">0.0000</span> 元
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-inner" id="progressBar"></div>
    </div>
    <div style="margin-top:20px;">
      <button class="btn btn-reset" style="width:auto;padding:10px 30px;" onclick="resetAll()">
        🔄 重新设置
      </button>
    </div>
  </div>

</div>

<script>
// ============ 状态 ============
let monthlySalary = 0;
let workDaysPerMonth = 22;
let workSecondsPerDay = 0;  // 每天工作秒数
let perSecondRate = 0;      // 每秒工资
let accumulated = 0;        // 累计金额
let startTimestamp = 0;     // 计时起点
let running = false;
let animFrameId = null;
let lastCoinCheck = 0;      // 上次检查金币触发

// ============ 金币系统 ============
const canvas = document.getElementById('coinCanvas');
const ctx = canvas.getContext('2d');
let coins = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Coin {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vy = -8 - Math.random() * 12;  // 向上弹出
    this.vx = (Math.random() - 0.5) * 6;
    this.gravity = 0.3 + Math.random() * 0.2;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotationSpeed = (Math.random() - 0.5) * 0.2;
    this.scale = 0.6 + Math.random() * 0.8;
    this.life = 1;
    this.decay = 0.003 + Math.random() * 0.006;
    this.sparkTimer = 0;
  }

  update() {
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.rotation += this.rotationSpeed;
    this.life -= this.decay;
    this.sparkTimer++;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.scale(this.scale, this.scale);

    const r = 20;
    // 金币主体
    const grad = ctx.createRadialGradient(-3, -3, 2, 0, 0, r);
    grad.addColorStop(0, '#fff8a0');
    grad.addColorStop(0.4, '#ffd700');
    grad.addColorStop(0.8, '#daa520');
    grad.addColorStop(1, '#b8860b');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    // 边框
    ctx.strokeStyle = '#8b6914';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 内圈
    ctx.beginPath();
    ctx.arc(0, 0, r - 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(139,105,20,0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // ¥ 符号
    ctx.fillStyle = '#8b6914';
    ctx.font = 'bold 18px "Noto Sans SC"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('¥', 0, 1);

    // 闪光
    if (this.life > 0.7) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(-5, -6, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // 粒子火花
    if (this.sparkTimer < 15 && Math.random() < 0.6) {
      const sx = this.x + (Math.random() - 0.5) * 20;
      const sy = this.y + (Math.random() - 0.5) * 20;
      ctx.fillStyle = `rgba(255,215,0,${this.life})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 1 + Math.random(), 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function spawnCoins(count = 15) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.42;  // 金额显示位置
  for (let i = 0; i < count; i++) {
    coins.push(new Coin(
      cx + (Math.random() - 0.5) * 120,
      cy + (Math.random() - 0.5) * 40
    ));
  }
  // 闪光层
  const flash = document.createElement('div');
  flash.className = 'flash-overlay';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 600);
}

function animateCoins() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = coins.length - 1; i >= 0; i--) {
    coins[i].update();
    coins[i].draw(ctx);
    if (coins[i].life <= 0) coins.splice(i, 1);
  }
  requestAnimationFrame(animateCoins);
}
animateCoins();

// ============ 背景粒子 ============
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 6;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 16) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    container.appendChild(p);
  }
}
createParticles();

// ============ 核心逻辑 ============
function calcRates() {
  const [sh, sm] = document.getElementById('startTime').value.split(':').map(Number);
  const [eh, em] = document.getElementById('endTime').value.split(':').map(Number);
  workSecondsPerDay = (eh * 3600 + em * 60) - (sh * 3600 + sm * 60);
  if (workSecondsPerDay <= 0) workSecondsPerDay = 8 * 3600; // fallback

  monthlySalary = parseFloat(document.getElementById('salary').value) || 25000;
  workDaysPerMonth = parseInt(document.getElementById('workDays').value) || 22;

  perSecondRate = monthlySalary / workDaysPerMonth / workSecondsPerDay;
}

function startEarning() {
  calcRates();
  if (perSecondRate <= 0) return;

  running = true;
  accumulated = 0;
  lastCoinCheck = 0;
  startTimestamp = performance.now();

  document.getElementById('settingsPanel').classList.add('hidden');
  document.getElementById('displayArea').style.display = '';

  document.getElementById('infoPerSec').textContent = perSecondRate.toFixed(6);
  document.getElementById('infoPerHour').textContent = '¥' + (perSecondRate * 3600).toFixed(2);
  document.getElementById('infoToday').textContent = '¥0.00';
  document.getElementById('moneyPerSec').textContent = perSecondRate.toFixed(4);
  document.getElementById('moneyAmount').textContent = '0.00';

  updateLoop();
}

function updateLoop() {
  if (!running) return;

  const now = performance.now();
  accumulated = ((now - startTimestamp) / 1000) * perSecondRate;

  // 当前时间
  const totalSec = Math.floor((now - startTimestamp) / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;

  // 整数部分触发金币（每到10的倍数）
  const intPart = Math.floor(accumulated);
  if (intPart > 0 && intPart % 10 === 0 && intPart !== lastCoinCheck) {
    lastCoinCheck = intPart;
    spawnCoins(12 + Math.floor(intPart / 10) * 3);
    // 脉冲动画
    const el = document.getElementById('moneyAmount');
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
  }

  // 更新数值
  document.getElementById('moneyAmount').textContent = accumulated.toFixed(2);
  document.getElementById('infoToday').textContent = '¥' + accumulated.toFixed(2);

  // 进度条
  const dailyTarget = perSecondRate * workSecondsPerDay;
  const pct = Math.min(100, (accumulated / dailyTarget) * 100);
  document.getElementById('progressBar').style.width = pct + '%';

  animFrameId = requestAnimationFrame(updateLoop);
}

function resetAll() {
  running = false;
  if (animFrameId) cancelAnimationFrame(animFrameId);
  accumulated = 0;
  lastCoinCheck = 0;
  coins = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('settingsPanel').classList.remove('hidden');
  document.getElementById('displayArea').style.display = 'none';
}

// 键盘快捷操作
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !running) startEarning();
  if (e.key === 'Escape') resetAll();
});
</script>
</body>
</html>
